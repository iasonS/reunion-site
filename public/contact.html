<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — ACS Athens Class of 2016</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦉</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hero hero--small">
    <div class="hero-inner">
      <p class="eyebrow"><a href="/" class="eyebrow-link">&larr; Back</a></p>
      <h1>Get in Touch</h1>
      <p class="subtitle">Questions, suggestions, or just want to say hi.</p>
    </div>
  </div>

  <section class="rsvp-section">
    <div class="container">
      <div id="contact-success" class="success-msg" style="display:none">
        <span>&#10003;</span> Message sent! We'll get back to you soon.
        <a href="/" class="back-link">Back to main page</a>
      </div>

      <form id="contact-form" class="rsvp-form">
        <div class="field">
          <label for="contact-name">Your Name <span class="req">*</span></label>
          <input type="text" id="contact-name" name="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="contact-email">Your Email <span class="req">*</span></label>
          <input type="email" id="contact-email" name="email" placeholder="you@example.com" required>
        </div>
        <!-- Honeypot -->
        <div class="field" style="position:absolute;left:-9999px;top:-9999px;" aria-hidden="true" tabindex="-1">
          <label for="website">Website</label>
          <input type="text" id="website" name="website" autocomplete="off" tabindex="-1">
        </div>
        <div class="field">
          <label for="contact-message">Message <span class="req">*</span></label>
          <textarea id="contact-message" name="message" rows="5" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p>ACS Athens &middot; Class of 2016 &middot; <a href="/">Home</a></p>
  </footer>

  <script>
    document.getElementById('contact-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        var res = await fetch('/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('contact-name').value,
            email: document.getElementById('contact-email').value,
            message: document.getElementById('contact-message').value,
            website: document.getElementById('website').value
          })
        });
        if (res.ok) {
          this.style.display = 'none';
          document.getElementById('contact-success').style.display = 'flex';
        } else {
          alert('Failed to send. Please try again.');
        }
      } catch (err) {
        alert('Failed to send. Please try again.');
      }
      btn.disabled = false;
      btn.textContent = 'Send Message';
    });
  </script>
</body>
</html>
